<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SAP-C02 Active Recall Quiz</title>
<style>
:root{--bg:#f5f5f7;--card:#fff;--card2:#fbfbfd;--text:#1d1d1f;--muted:#6e6e73;--line:#d2d2d7;--blue:#007aff;--green:#34c759;--orange:#ff9500;--red:#ff3b30;--shadow:0 12px 35px rgba(0,0,0,.08)}[data-theme=dark]{--bg:#161617;--card:#232325;--card2:#2c2c2e;--text:#f5f5f7;--muted:#a1a1a6;--line:#3a3a3c;--shadow:0 12px 35px rgba(0,0,0,.35)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif}header{position:sticky;top:0;z-index:10;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}.top{max-width:1180px;margin:auto;padding:13px 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}h1{font-size:19px;margin:0;letter-spacing:-.03em}.sub{font-size:12px;color:var(--muted)}.spacer{flex:1}button,select{font:inherit;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:12px;padding:9px 11px;cursor:pointer}button.primary{background:var(--blue);border-color:var(--blue);color:white}.wrap{max-width:1180px;margin:16px auto;padding:0 16px;display:grid;grid-template-columns:1fr 330px;gap:14px}.panel{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);overflow:hidden}.head{padding:13px 16px;border-bottom:1px solid var(--line);display:flex;gap:8px;align-items:center}.body{padding:16px}.quiz h2{font-size:25px;letter-spacing:-.04em;margin:0 0 8px}.muted{color:var(--muted)}.pill{display:inline-block;border:1px solid var(--line);background:var(--card2);border-radius:999px;padding:4px 8px;font-size:11px;color:var(--muted);margin:2px}.question{background:var(--card2);border:1px solid var(--line);border-left:5px solid var(--orange);border-radius:16px;padding:15px;margin:14px 0;font-size:17px;line-height:1.55}.answer{display:none}.answer.show{display:block}.block{background:var(--card2);border:1px solid var(--line);border-left:5px solid var(--blue);border-radius:15px;padding:13px;margin:10px 0}.block h3{margin:0 0 6px;font-size:12px;letter-spacing:.07em;color:var(--muted)}.then{border-left-color:var(--green)}.never{border-left-color:var(--red)}.why{border-left-color:var(--blue)}.memory{border-left-color:var(--orange)}ul{margin:7px 0 0 20px;padding:0}.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.grade{flex:1;min-width:90px}.again{color:var(--red)}.hard{color:var(--orange)}.good{color:var(--green)}.easy{color:var(--blue)}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.stat{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:10px}.stat b{display:block;font-size:22px}.stat span{font-size:11px;color:var(--muted)}.focus-list{margin-top:12px}.focus{padding:10px;border:1px solid var(--line);border-radius:13px;background:var(--card2);margin-bottom:8px;cursor:pointer}.focus:hover{border-color:var(--blue)}.cheat code{background:var(--card2);padding:2px 5px;border-radius:5px}.cheat h3{margin:18px 0 6px}.link{color:var(--blue);text-decoration:none}@media(max-width:900px){.wrap{grid-template-columns:1fr}.top{align-items:flex-start}.spacer{display:none}}
</style>
</head>
<body>
<header><div class="top"><div><h1>SAP-C02 Active Recall</h1><div class="sub">Built for experienced SAs: recall the decision, then check traps.</div></div><span class="spacer"></span><select id="mode"><option value="all">All patterns</option><option value="enterprise">Enterprise governance/IAM focus</option><option value="traps">Trap drill</option><option value="compare">Memory cards</option></select><button id="theme">Dark</button><a class="link" href="sap_c02_kg_viewer.html">Knowledge map</a></div></header>
<main class="wrap"><section class="panel quiz"><div class="head"><b id="modeTitle">Quiz</b><span class="muted" id="progress"></span></div><div class="body" id="quiz"></div></section><aside class="panel"><div class="head"><b>Session</b></div><div class="body"><div class="stats" id="stats"></div><div class="focus-list" id="focus"></div></div></aside></main>
<script>
const DATA='data/sap_c02_knowledge_graph.json';let KG,N,E,byId,deck=[],idx=0,shown=false,score={again:0,hard:0,good:0,easy:0};
const $=id=>document.getElementById(id), esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const enterpriseWords=['scp','organization','organizations','iam','identity center','permission boundary','control tower','guardduty','security hub','config','cloudtrail','ram','resource policy','cross-account','sso','mfa','saml'];
const memoryCards=[
{title:'SCP vs IAM',q:'What is the fastest memory model for SCP vs IAM?',a:'SCP defines the maximum available permissions for an AWS account. IAM grants permissions to a principal. SCP never grants by itself; IAM still must allow.',never:['Do not say IAM admin can bypass SCP.','Do not use permission boundaries to override SCP.']},
{title:'Policy evaluation',q:'What is the authorization shortcut?',a:'Explicit Deny anywhere wins. Then SCP must allow. Then IAM or resource policy must allow. Permission boundary/session policy must not cap it.',never:['Do not look only at IAM Allow.','Do not forget resource/KMS key policy for cross-account access.']},
{title:'IAM Identity Center',q:'When should you choose IAM Identity Center?',a:'Workforce access, many AWS accounts, SSO, external IdP such as Okta/Azure AD, permission sets, centralized human access.',never:['Do not create long-lived IAM users for human production access.']},
{title:'Permission boundary',q:'What is a permission boundary for?',a:'Delegating IAM creation safely. It caps the maximum permissions a user/role can receive.',never:['It does not grant permissions.','It does not override SCPs.','It is not an organization-wide guardrail.']},
{title:'Resource policy',q:'Identity policy vs resource policy?',a:'Identity policy says what this principal can do. Resource policy says who can access this resource. Cross-account often needs the resource policy and caller permissions.',never:['Do not forget KMS key policy when encrypted resources are involved.']},
{title:'Control Tower vs Organizations',q:'When do you choose Control Tower vs plain Organizations?',a:'Control Tower for landing zone, account factory, guardrails, standardized multi-account setup. Organizations/SCP for account hierarchy and policy guardrails.',never:['Do not choose Control Tower just for one permission exception.']},
{title:'Config vs Security Hub vs GuardDuty',q:'How to remember Config, Security Hub, GuardDuty?',a:'Config checks resource configuration/compliance. Security Hub aggregates security findings/standards. GuardDuty detects threats from logs and behavior.',never:['Security Hub is not the detector. Macie is not threat detection.']},
{title:'Cross-account access',q:'What is the cross-account access memory model?',a:'Human access: Identity Center/federation/assume role. Service access: IAM role. External access to a specific resource: resource policy and/or role trust. Org-wide restriction: SCP.',never:['Do not create IAM users in every account.']}
];
async function init(){try{KG=await fetch(DATA).then(r=>r.json())}catch(e){$('quiz').innerHTML='<h2>Could not load data</h2><p>On GitHub Pages this works. Locally use a small web server.</p>';return}N=KG.nodes;E=KG.edges;byId=Object.fromEntries(N.map(n=>[n.id,n]));buildDeck();bind();render()}
function concepts(p){return E.filter(e=>e.source===p.id&&e.relation==='USES_CONCEPT').map(e=>byId[e.target])}function traps(p){return E.filter(e=>e.source===p.id&&e.relation==='AVOIDS').map(e=>byId[e.target])}function domain(p){let e=E.find(e=>e.target===p.id&&e.relation==='CONTAINS_PATTERN');return e?byId[e.source]:null}
function buildDeck(){let mode=$('mode').value;let patterns=N.filter(n=>n.type==='DecisionPattern');if(mode==='enterprise')patterns=patterns.filter(p=>{let text=[p.label,p.if_when,p.then,p.why,concepts(p).map(c=>c.label).join(' ')].join(' ').toLowerCase();return enterpriseWords.some(w=>text.includes(w))});if(mode==='traps')deck=patterns.flatMap(p=>traps(p).map(t=>({kind:'trap',p,t})));else if(mode==='compare')deck=memoryCards.map(c=>({kind:'memory',c}));else deck=patterns.map(p=>({kind:'pattern',p}));shuffle(deck);idx=0;shown=false}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
function bind(){$('mode').onchange=()=>{buildDeck();render()};$('theme').onclick=()=>{let d=document.documentElement.dataset.theme!=='dark';document.documentElement.dataset.theme=d?'dark':'light';$('theme').textContent=d?'Light':'Dark'}}
function render(){renderStats();if(!deck.length){$('quiz').innerHTML='<div class="question">No cards in this mode.</div>';return}let card=deck[idx%deck.length];$('progress').textContent=`${idx+1} / ${deck.length}`;$('modeTitle').textContent=$('mode').selectedOptions[0].textContent;if(card.kind==='pattern')renderPattern(card.p);else if(card.kind==='trap')renderTrap(card.p,card.t);else renderMemory(card.c)}
function renderPattern(p){let d=domain(p),cs=concepts(p),ts=traps(p);$('quiz').innerHTML=`<h2>${esc(p.label)}</h2><div>${d?`<span class="pill">${esc(d.label)}</span>`:''}${p.scenario_ref?`<span class="pill">${esc(p.scenario_ref)}</span>`:''}</div><div class="question"><b>Recall:</b><br>${esc(p.if_when||'Given this scenario, what should you choose?')}<br><br><span class="muted">Say the AWS-native design out loud before reveal.</span></div>${reveal(`<div class="block then"><h3>THEN</h3>${esc(p.then)}</div>${ts.length?`<div class="block never"><h3>NEVER / TRAPS</h3><ul>${ts.map(t=>`<li>${esc(t.label)}</li>`).join('')}</ul></div>`:''}${p.why?`<div class="block why"><h3>WHY</h3>${esc(p.why)}</div>`:''}<div>${cs.map(c=>`<span class="pill">${esc(c.label)}</span>`).join('')}</div>`)}`;attach()}
function renderTrap(p,t){$('quiz').innerHTML=`<h2>Trap Drill</h2><div class="question"><b>Why is this wrong?</b><br><br>${esc(t.label)}</div>${reveal(`<div class="block then"><h3>CORRECT PATTERN</h3><b>${esc(p.label)}</b><br>${esc(p.then)}</div><div class="block memory"><h3>MEMORY HOOK</h3>${esc(p.if_when)}</div>`)}`;attach()}
function renderMemory(c){$('quiz').innerHTML=`<h2>${esc(c.title)}</h2><div class="question">${esc(c.q)}</div>${reveal(`<div class="block then"><h3>ANSWER</h3>${esc(c.a)}</div><div class="block never"><h3>DO NOT CONFUSE</h3><ul>${c.never.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`)}`;attach()}
function reveal(html){return `<div class="answer ${shown?'show':''}" id="ans">${html}<div class="row"><button class="grade again" data-g="again">Again</button><button class="grade hard" data-g="hard">Hard</button><button class="grade good" data-g="good">Good</button><button class="grade easy" data-g="easy">Easy</button></div></div><div class="row"><button class="primary" id="reveal">${shown?'Hide answer':'Reveal answer'}</button><button id="next">Skip / Next</button></div>`}
function attach(){$('reveal').onclick=()=>{shown=!shown;render()};$('next').onclick=next;document.querySelectorAll('.grade').forEach(b=>b.onclick=()=>{score[b.dataset.g]++;next()})}
function next(){idx=(idx+1)%deck.length;shown=false;render()}
function renderStats(){$('stats').innerHTML=`<div class="stat"><b>${deck.length}</b><span>Cards</span></div><div class="stat"><b>${score.good+score.easy}</b><span>Known</span></div><div class="stat"><b>${score.again}</b><span>Again</span></div><div class="stat"><b>${score.hard}</b><span>Hard</span></div>`;$('focus').innerHTML=`<div class="block memory cheat"><h3>Enterprise memory core</h3><p><code>SCP</code> caps account permissions.</p><p><code>IAM</code> grants principal permissions.</p><p><code>Resource policy</code> allows access to a resource.</p><p><code>Boundary</code> caps delegated principals.</p><p><code>Identity Center</code> is workforce SSO.</p></div>`}
init();
</script>
</body></html>
